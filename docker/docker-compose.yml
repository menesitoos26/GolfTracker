name: golf-tracker

services:

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: golf_frontend
    networks:
      - golf_network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: golf_backend
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - golf_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: golf_db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: golf_db
      MYSQL_USER: golf_user
      MYSQL_PASSWORD: golf_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - golf_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: golf_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - golf_network
    restart: unless-stopped

networks:
  golf_network:
    driver: bridge

volumes:
  mysql_data: